<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>KeyRules × ALG Capitals — Elite Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #050505; color: #fff; font-family: 'Geist', system-ui, sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./DashPrimitives.jsx"></script>
<script type="text/babel" src="./DashSimData.jsx"></script>
<script type="text/babel" src="./DashPanels.jsx"></script>
<script type="text/babel" src="./DashPanelsB.jsx"></script>
<script type="text/babel">
function EliteDashboard() {
  React.useEffect(() => {
    const style = document.createElement('style');
    style.textContent = window.dashGlobalCSS;
    document.head.appendChild(style);
    return () => document.head.removeChild(style);
  }, []);
  return (
    <div data-screen-label="01 Elite Cockpit" style={{ minHeight: '100vh', background: '#050505', padding: 20, maxWidth: 1600, margin: '0 auto' }}>
      <EliteHeader name="Lucas T."/>
      <TickerStrip/>
      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 18, alignItems: 'start' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <EquityPanel/>
          <BiasPanel/>
          <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 18 }}>
            <JournalPanel/>
            <ChecklistPanel/>
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <ChallengePanel/>
          <LicensesPanel/>
          <AcademyPanel/>
          <RiskPanel/>
          <SignalsPanel/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<EliteDashboard />);
</script>
</body>
</html>
