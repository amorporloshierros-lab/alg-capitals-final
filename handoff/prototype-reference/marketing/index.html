<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>KeyRules × ALG Capitals — Marketing UI Kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #050505; color: #e2e8f0; font-family: 'Geist', system-ui, sans-serif; }
  .screen-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; padding: 8px; background: rgba(5,5,5,.95); border: 1px solid rgba(16,185,129,.2); backdrop-filter: blur(10px); z-index: 100; box-shadow: 0 0 30px rgba(16,185,129,.2); }
  .screen-nav button { padding: 10px 18px; font: 900 9px/1 'Geist'; letter-spacing: .3em; color: #737373; text-transform: uppercase; background: transparent; border: none; cursor: pointer; font-style: italic; }
  .screen-nav button.active { color: #10b981; background: rgba(16,185,129,.1); }
  .sr { opacity: 0; transition: opacity 900ms cubic-bezier(.2,.7,.2,1), transform 900ms cubic-bezier(.2,.7,.2,1), filter 900ms ease; }
  .sr-up    { transform: translateY(40px); }
  .sr-up-lg { transform: translateY(60px); filter: blur(6px); }
  .sr-left  { transform: translateX(-40px); }
  .sr-right { transform: translateX(40px); }
  .sr-zoom  { transform: scale(.92); filter: blur(4px); }
  .sr.sr-in { opacity: 1; transform: none; filter: none; }

  /* Screen transitions — cinematic fade + subtle zoom */
  .screen-container {
    opacity: 1;
    transform: scale(1);
    transition: opacity 420ms cubic-bezier(.4,0,.2,1), transform 600ms cubic-bezier(.2,.7,.2,1);
    transform-origin: 50% 30%;
  }
  .screen-container.fading {
    opacity: 0;
    transform: scale(.98);
  }

  /* Wipe overlay — scan line sweeps horizontally during transition */
  .screen-wipe {
    position: fixed; inset: 0; z-index: 150;
    pointer-events: none;
    opacity: 0;
    background:
      linear-gradient(90deg,
        transparent 0%,
        rgba(16,185,129,.08) 45%,
        rgba(16,185,129,.25) 50%,
        rgba(16,185,129,.08) 55%,
        transparent 100%);
    background-size: 300% 100%;
    background-position: 100% 0;
    transition: opacity 200ms;
  }
  .screen-wipe.active {
    opacity: 1;
    animation: screenWipe 850ms cubic-bezier(.5,.02,.5,1) forwards;
  }
  @keyframes screenWipe {
    0%   { background-position: 100% 0; opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { background-position: -100% 0; opacity: 0; }
  }

  /* Entry animation for screen content after swap — only on top-level wrapper to avoid clash with .sr */
  .screen-container:not(.fading) {
    animation: screenEnter 550ms cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes screenEnter {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#050505"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#10b981" stroke-width="2"/>
    <circle cx="50" cy="50" r="14" fill="none" stroke="#10b981" stroke-width="1" opacity=".5"/>
    <text x="50" y="55" text-anchor="middle" font-family="monospace" font-weight="900" font-style="italic" font-size="14" fill="#10b981" letter-spacing="1">KR</text>
  </svg>
</template>
<div id="root"></div>
<script type="text/babel" src="./CoinIntro.jsx"></script>
<script type="text/babel" src="./Chrome.jsx"></script>

<script type="text/babel" src="./Screens.jsx"></script>
<script type="text/babel" src="../dashboard/DashPrimitives.jsx"></script>
<script type="text/babel" src="../dashboard/DashSimData.jsx"></script>
<script type="text/babel" src="../dashboard/DashPanels.jsx"></script>
<script type="text/babel" src="../dashboard/DashPanelsB.jsx"></script>
<script type="text/babel" src="../admin/AdminDashboard.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function ScrollReveal() {
  useEffect(() => {
    const mark = () => {
      // Broader selector: main, divs with direct section-like role, plus content elements
      document.querySelectorAll('img, section, footer, h2, h3, h1, p, [data-reveal]').forEach(el => {
        // skip intro/dashboard/navbar/fixed chrome
        if (el.closest('.coin-drop-wrap, [data-dash], .screen-nav, nav, .screen-wipe')) return;
        if (!el.classList.contains('sr')) {
          el.classList.add('sr');
          // Assign variants for visual rhythm
          const r = Math.random();
          if (el.tagName === 'H1' || el.tagName === 'H2') el.classList.add('sr-up-lg');
          else if (el.tagName === 'IMG') el.classList.add('sr-zoom');
          else if (r < 0.4) el.classList.add('sr-left');
          else if (r < 0.7) el.classList.add('sr-right');
          else el.classList.add('sr-up');
        }
      });
      // Also mark direct children of main and top-level divs as stagger items
      document.querySelectorAll('main > *, [data-section] > *').forEach(el => {
        if (!el.classList.contains('sr')) {
          el.classList.add('sr', 'sr-up');
        }
      });
    };
    mark();
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add('sr-in');
        else e.target.classList.remove('sr-in');
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
    const attach = () => document.querySelectorAll('.sr').forEach(el => io.observe(el));
    attach();
    const t = setInterval(() => { mark(); attach(); }, 600);
    return () => { io.disconnect(); clearInterval(t); };
  }, []);
  return null;
}

function DashboardScreen({ onBack }) {
  React.useEffect(() => {
    const style = document.createElement('style');
    style.textContent = window.dashGlobalCSS;
    document.head.appendChild(style);
    return () => document.head.removeChild(style);
  }, []);
  return (
    <div style={{ minHeight: '100vh', background: '#050505', padding: 20, maxWidth: 1600, margin: '0 auto' }}>
      <EliteHeader name="Lucas T." onBack={onBack}/>
      <TickerStrip/>
      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 18, alignItems: 'start' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <EquityPanel/>
          <BiasPanel/>
          <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 18 }}>
            <JournalPanel/>
            <ChecklistPanel/>
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <ChallengePanel/>
          <LicensesPanel/>
          <AcademyPanel/>
          <RiskPanel/>
          <SignalsPanel/>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('mk_screen') || 'home');
  const [prevScreen, setPrevScreen] = useState(null);
  const [transitioning, setTransitioning] = useState(false);
  // Intro plays once per session; skip on subsequent nav within same tab
  const [introDone, setIntroDone] = useState(() => sessionStorage.getItem('mk_intro_done') === '1');

  const go = (s) => {
    if (s === screen || transitioning) return;
    setPrevScreen(screen);
    setTransitioning(true);
    // fade-out first, then swap
    setTimeout(() => {
      setScreen(s);
      localStorage.setItem('mk_screen', s);
      window.scrollTo(0, 0);
      // fade-in
      requestAnimationFrame(() => {
        setTimeout(() => { setTransitioning(false); setPrevScreen(null); }, 50);
      });
    }, 420);
  };

  const screenContent = (currentScreen) => (
    <>
      {currentScreen === 'home' && (
        <>
          <Hero onAccess={() => go('dashboard')} />
          <Auditoria />
          <Plans bookImg="../../assets/libro-keywick.jpg" />
          <Footer />
        </>
      )}
      {currentScreen === 'planes' && (<><Plans bookImg="../../assets/libro-keywick.jpg" /><Footer /></>)}
      {currentScreen === 'cert' && (<><Certificados /><Footer /></>)}
      {currentScreen === 'adn' && (<><ADN /><Footer /></>)}
      {currentScreen === 'dashboard' && <DashboardScreen onBack={() => go('home')}/>}
      {currentScreen === 'admin' && <AdminShell onBack={() => go('home')}/>}
    </>
  );

  return (
    <div data-screen-label={`01 ${screen}`}>
      <CoinIntro skip={introDone} onDone={() => { setIntroDone(true); sessionStorage.setItem('mk_intro_done', '1'); }} />
      <Navbar onNav={go} current={screen} />

      {/* Wipe overlay — scans across when transitioning */}
      <div className={transitioning ? 'screen-wipe active' : 'screen-wipe'} />

      {/* Screen content with fade transition */}
      <div className={transitioning ? 'screen-container fading' : 'screen-container'}>
        {screenContent(screen)}
      </div>

      {screen !== 'dashboard' && <ChatBotFab/>}
      <ScrollReveal/>

      <div className="screen-nav">
        {[['home','Home'],['planes','Planes'],['cert','Testimonios'],['adn','ADN'],['dashboard','Portal'],['admin','Admin']].map(([k,l]) => (
          <button key={k} className={screen===k?'active':''} onClick={() => go(k)}>{l}</button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
